<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Travel Verification Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="https://uploads.onecompiler.io/44tvrmuwd/1783206060333/19223.gif">
    <style>
        :root {
            --primary: #0a2540;
            --accent: #ffb703;
            --success: #2ec4b6;
            --danger: #e71d36;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .travel-card {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.6s ease;
        }
        .hero-banner {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            padding: 35px 20px;
            text-align: center;
            position: relative;
            border-bottom: 3px solid var(--accent);
        }
        .hero-banner i {
            font-size: 45px;
            color: var(--accent);
            margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(255, 183, 3, 0.4);
        }
        .hero-banner h2 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
            font-weight: 700;
        }
        .hero-banner p {
            margin: 5px 0 0;
            font-size: 13px;
            color: #94a3b8;
        }
        .main-form { padding: 30px; }
        .input-group { margin-bottom: 22px; position: relative; }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #cbd5e1;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 38px;
            color: #64748b;
        }
        input, select {
            width: 100%;
            padding: 14px 14px 14px 42px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 10px rgba(255, 183, 3, 0.2);
        }
        .btn-verify {
            width: 100%;
            background: linear-gradient(90deg, #ffb703 0%, #fb8500 100%);
            color: #023047;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(251, 133, 0, 0.3);
        }
        .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(251, 133, 0, 0.5); }
        
        /* Result Screen */
        #resultView { display: none; padding: 25px; }
        .status-badge {
            text-align: center;
            padding: 15px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .status-paid { background: rgba(46, 196, 182, 0.15); color: var(--success); border: 1px solid var(--success); }
        .status-notpaid { background: rgba(231, 29, 54, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        
        .data-list { background: rgba(15, 23, 42, 0.4); border-radius: 14px; padding: 10px 15px; border: 1px solid #334155; }
        .data-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #334155;
            font-size: 14px;
        }
        .data-item:last-child { border: none; }
        .data-label { color: #94a3b8; }
        .data-value { font-weight: 600; color: #f8fafc; }
        
        .btn-pay-now {
            display: block;
            background: linear-gradient(90deg, #2ec4b6 0%, #0cbaba 100%);
            color: white;
            text-align: center;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            margin-top: 25px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(46, 196, 182, 0.3);
        }
        .btn-close-refresh {
            width: 100%;
            background: #334155;
            color: white;
            border: none;
            padding: 13px;
            border-radius: 12px;
            margin-top: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="travel-card">
    <div class="hero-banner">
        <i class="fa-solid fa-plane-departure"></i>
        <h2>TRAVEL RAHMAN Status Check-in</h2>
        <p>Documents Verification & Fee Status</p>
    </div>
    
    <div class="main-form" id="inputBox">
        <div class="input-group">
            <label>Passport & (TRN) Number:</label>
            <i class="fa-solid fa-passport"></i>
            <input type="text" id="userPass" placeholder="passport.&.(trn).No..">
        </div>
        
        <div class="input-group">
            <label>Document Type:</label>
            <i class="fa-solid fa-layer-group"></i>
            <select id="userType" style="padding-left: 42px;">
                <option>Apply</option><option>Job's</option><option>Work Permit</option>
                <option>Man-Power</option><option>Crime Report</option><option>Visa Fee</option>
                <option>File Process Location</option><option>Employer Verification</option>
            </select>
        </div>
        <button class="btn-verify" onclick="verifyTravelData()">Chec-king Now</button>
    </div>

    <div id="resultView">
        <div id="statusBadge" class="status-badge"></div>
        <div class="data-list">
            <div class="data-item"><span class="data-label">Employer Name:</span><span id="rEmp" class="data-value"></span></div>
            <div class="data-item"><span class="data-label">Passport & (TRN) Number:</span><span id="rPass" class="data-value"></span></div>
            <div class="data-item"><span class="data-label">Processing Status:</span><span id="rType" class="data-value"></span></div>
            <div class="data-item"><span class="data-label">Update Date/Time:</span><span id="rDate" class="data-value"></span></div>
            <div class="data-item"><span class="data-label">Payment status:</span><span id="rCurr" class="data-value"></span></div>
        </div>
        
        <a href="https://best-payment-gateways-international.vercel.app/" id="payBtn" class="btn-pay-now"><i class="fa-solid fa-credit-card"></i>Pay Continue</a>
        <button class="btn-close-refresh" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i> Close</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDgiL1iFUfbs1iaP6v_YPadbn49eiku1WE",
        databaseURL: "https://webpagecybersecurity-default-rtdb.firebaseio.com",
        projectId: "webpagecybersecurity",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function verifyTravelData() {
        const pass = document.getElementById('userPass').value.trim();
        const type = document.getElementById('userType').value;
        if(!pass) return alert("Please enter the passport and (TRN) number correctly...");

        db.ref('fee_payments/' + pass).once('value').then((snapshot) => {
            const data = snapshot.val();
            if(data && data.type === type) {
                document.getElementById('inputBox').style.display = 'none';
                document.getElementById('resultView').style.display = 'block';
                
                document.getElementById('rEmp').innerText = data.employer;
                document.getElementById('rPass').innerText = pass;
                document.getElementById('rType').innerText = data.type;
                document.getElementById('rDate').innerText = data.pay_date;
                document.getElementById('rCurr').innerText = data.currency;

                const badge = document.getElementById('statusBadge');
                if(data.status === "Paid") {
                    badge.innerHTML = '<i class="fa-solid fa-circle-check"></i> ✅ You have no fees.Paid Successfully';
                    badge.className = "status-badge status-paid";
                } else {
                    badge.innerHTML = '<i class="fa-solid fa-hourglass-half"></i> ⌛ Pay your fees quickly...';
                    badge.className = "status-badge status-notpaid";
                }
            } else { alert("Sorry! No such document was found! Please provide correct information."); }
        });
    }
</script>
</body>
</html>
